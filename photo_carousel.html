    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">

        <style>
            @keyframes slide {
              from { transform: translateX(0); }
              to { transform: translateX(-50%); }
            }

            body{
                font-family: 'Roboto', sans-serif;
                background-color: #f0f1f5;
                color: #070d10;
                text-align: center;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                border-radius: 8px;
                overflow: hidden;
            }

            .images {
              position: relative;
              width: 100vw;
              max-width: 100%;
              min-height: 124px;
              overflow-x: hidden;

            }

            .track {
              position: absolute;
              display: flex;
              flex-direction: row;
              will-change: transform;
              animation: slide 94s linear infinite;
            }

            img{
                width: 75px;
                height: 75px;
                margin: 24px 48px;
            }

            h1{
                font-size: 1.8em;
            }

            h1, p{
                width: 70%;
                max-width: 500px;
                margin: 0 auto;
                padding: 24px 0;
            }

            a{
                color: #12CCE5;
            }

            @media screen and (max-width: 445px) {
                h1, p{
                    width: 90%;
                }

                .images{
                    min-height: 75px;
                }

                h1{
                    font-size: 1.5em;
                    padding-bottom: 48px;
                }

                p{
                    padding-top: 48px;
                }

                img{
                    margin: 0 24px;
                }

            }

            @media screen and (max-height: 320px) {
                h1{
                    font-size: 1.2em;
                    padding-bottom: 48px
                }

                p{
                    font-size: 0.75em;
                    padding-top: 48px
                }

                .images{
                    min-height: 50px;
                    padding: 0;
                }

                img{
                    width: 50px;
                    height: 50px;
                    margin: 0 24px;
                }
            }
        </style>
    </head>
